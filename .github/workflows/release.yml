name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, such as v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish-release:
    name: Publish package
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Enable pnpm
        run: corepack enable

      - name: Validate package versions match tag
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const releaseTag = process.env.RELEASE_TAG;
          const packages = [
            'packages/web/package.json'
          ];

          for (const packagePath of packages) {
            const manifest = JSON.parse(readFileSync(packagePath, 'utf8'));
            if (`v${manifest.version}` !== releaseTag) {
              console.error(`${packagePath} version ${manifest.version} does not match ${releaseTag}`);
              process.exitCode = 1;
            }
          }
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack packages
        id: packs
        run: |
          pnpm --dir packages/web pack --pack-destination "$PWD"
          echo "web_tarball=$(ls async-web-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: |
          npm publish "${{ steps.packs.outputs.web_tarball }}" --access public

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --verify-tag --generate-notes --title "${RELEASE_TAG}"
          fi

      - name: Attach package tarball to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" "${{ steps.packs.outputs.web_tarball }}" --clobber
