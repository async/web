<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebRuntime</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        touch-action: manipulation;
      }

      body.directory-mode {
        overflow: auto;
      }

      body.directory-mode .shell {
        display: none;
      }

      body.shell-mode .directory-home {
        display: none;
      }

      html,
      button,
      input,
      select,
      a {
        font: inherit;
        touch-action: manipulation;
      }

      .shell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) 180px;
        min-height: 100vh;
      }

      .directory-home {
        min-height: 100vh;
        padding: 34px;
      }

      .directory-home__header {
        max-width: 860px;
        margin-bottom: 24px;
      }

      .directory-home h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.1;
      }

      .directory-home p {
        margin: 0;
        color: #516176;
        line-height: 1.5;
      }

      .directory-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
      }

      .directory-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 280px;
        padding: 18px;
        border: 1px solid #c8d3e3;
        border-radius: 8px;
        background: #ffffff;
        color: inherit;
        text-decoration: none;
      }

      .directory-card:hover {
        border-color: #7184a0;
        background: #f9fbfe;
      }

      .directory-card__top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .directory-card strong {
        font-size: 18px;
      }

      .directory-card__cta {
        flex: 0 0 auto;
        border: 1px solid #172033;
        border-radius: 6px;
        padding: 5px 8px;
        background: #172033;
        color: #ffffff;
        font-size: 12px;
      }

      .directory-card__summary {
        color: #516176;
        line-height: 1.45;
      }

      .directory-card__path {
        width: fit-content;
        border: 1px solid #d9e1ee;
        border-radius: 6px;
        padding: 5px 7px;
        background: #f6f8fb;
        color: #263347;
        font: 12px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .directory-card__setup {
        display: grid;
        gap: 8px;
        margin-top: auto;
        color: #516176;
        font-size: 13px;
        line-height: 1.35;
      }

      .directory-card__setup span {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 8px;
      }

      .directory-card__setup b {
        color: #263347;
      }

      .toolbar {
        display: grid;
        grid-template-columns: auto minmax(140px, 180px) minmax(160px, 1fr) auto auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid #d9e1ee;
        background: #ffffff;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: #172033;
        color: #ffffff;
        font-size: 13px;
        letter-spacing: 0;
      }

      .nav-buttons,
      .actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .icon-button {
        position: relative;
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid #c8d3e3;
        border-radius: 6px;
        background: #ffffff;
        color: #263347;
        cursor: pointer;
      }

      .icon-button:hover {
        background: #eef3f9;
      }

      .webRuntime-tooltip {
        position: fixed;
        z-index: 10000;
        max-width: min(240px, 70vw);
        padding: 5px 7px;
        border: 1px solid #172033;
        border-radius: 6px;
        background: #172033;
        color: #ffffff;
        font-size: 12px;
        line-height: 1.3;
        opacity: 0;
        overflow-wrap: anywhere;
        pointer-events: none;
        text-align: left;
        transform: translateY(2px);
        transition: opacity 120ms ease, transform 120ms ease;
        white-space: normal;
        width: max-content;
      }

      .webRuntime-tooltip.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .icon-button svg {
        width: 17px;
        height: 17px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .url-input,
      .terminal-input,
      .mode-select {
        width: 100%;
        min-width: 0;
        border: 1px solid #c8d3e3;
        border-radius: 6px;
        padding: 8px 10px;
        background: #f9fbfe;
        color: #172033;
      }

      .status {
        min-width: 76px;
        color: #4d5e76;
        font-size: 13px;
        text-align: right;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        min-height: 0;
        overflow: hidden;
      }

      .preview-wrap {
        position: relative;
        display: grid;
        min-width: 0;
        min-height: 0;
        padding: 14px;
        overflow: hidden;
      }

      .preview {
        grid-area: 1 / 1;
        width: 100%;
        height: 100%;
        border: 1px solid #c8d3e3;
        border-radius: 8px;
        background: #ffffff;
      }

      .stream-status {
        position: absolute;
        right: 26px;
        bottom: 26px;
        z-index: 20;
        display: grid;
        gap: 8px;
        width: min(430px, calc(100% - 52px));
        max-height: min(240px, calc(100% - 52px));
        overflow: hidden;
        border: 1px solid #9bb4d2;
        border-radius: 8px;
        padding: 10px;
        background: rgba(249, 251, 254, 0.96);
        color: #172033;
        box-shadow: 0 12px 30px rgba(23, 32, 51, 0.14);
        font-size: 12px;
        pointer-events: none;
      }

      .stream-status[hidden] {
        display: none;
      }

      .stream-status__top,
      .stream-status__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }

      .stream-status__label {
        font-weight: 700;
      }

      .stream-status__pill {
        border: 1px solid #c8d3e3;
        border-radius: 999px;
        padding: 2px 7px;
        background: #ffffff;
        color: #3d4d64;
        font: 11px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .stream-status__bar {
        position: relative;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: #d9e1ee;
      }

      .stream-status__bar::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 45%;
        border-radius: inherit;
        background: #2563eb;
        animation: stream-status-slide 900ms ease-in-out infinite;
      }

      .stream-status.is-complete .stream-status__bar::before {
        width: 100%;
        animation: none;
        background: #16803c;
      }

      .stream-status__latest {
        min-height: 44px;
        max-height: 86px;
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        border: 1px solid #d9e1ee;
        border-radius: 6px;
        padding: 7px;
        background: #ffffff;
        color: #263347;
        font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      @keyframes stream-status-slide {
        0% {
          transform: translateX(-110%);
        }

        50% {
          transform: translateX(75%);
        }

        100% {
          transform: translateX(230%);
        }
      }

      .debug {
        display: grid;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
        border-left: 1px solid #d9e1ee;
        background: #ffffff;
      }

      .panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        padding: 12px;
        overflow: hidden;
        border-bottom: 1px solid #d9e1ee;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .panel h2 {
        margin: 0;
        font-size: 13px;
      }

      pre {
        min-height: 0;
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #263347;
      }

      .terminal {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid #d9e1ee;
        background: #172033;
      }

      .terminal pre {
        grid-column: 1 / -1;
        color: #dbe7f7;
      }

      .terminal-input {
        border-color: #3a4a63;
        background: #0f1726;
        color: #ffffff;
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
        }

        .directory-home {
          padding: 22px;
        }

        .shell {
          grid-template-rows: auto 760px 180px;
        }

        .toolbar,
        .workspace {
          grid-template-columns: 1fr;
        }

        .workspace {
          grid-template-rows: minmax(0, 260px) minmax(0, 1fr);
        }

        .status {
          text-align: left;
        }

        .debug {
          border-left: 0;
          border-top: 1px solid #d9e1ee;
        }
      }

      @media (max-width: 560px) {
        .directory-grid {
          grid-template-columns: 1fr;
        }

        .directory-card {
          min-height: 0;
        }

        .directory-card__top {
          display: grid;
        }

        .directory-card__cta {
          width: fit-content;
        }
      }
    </style>
  </head>
  <body class="directory-mode">
    <main id="example-directory" class="directory-home">
      <header class="directory-home__header">
        <h1>WebRuntime Examples</h1>
        <p>Pick a demo to open it in the WebRuntime shell. Each card shows how the demo is wired before it redirects into the route graph.</p>
      </header>
      <div id="example-directory-grid" class="directory-grid"></div>
    </main>
    <div class="shell">
      <header class="toolbar">
        <div class="brand">
          <span class="brand-mark">MW</span>
          <span>WebRuntime</span>
        </div>
        <select id="runtime-mode" class="mode-select" aria-label="Runtime mode">
          <option value="same-realm">Same realm</option>
          <option value="backend-iframe">Backend iframe</option>
          <option value="two-iframes">Two iframes</option>
        </select>
        <input id="fake-url" class="url-input" value="/" aria-label="Fake URL">
        <div class="nav-buttons" aria-label="Navigation controls">
          <button class="icon-button" type="button" data-action="back" title="Back in fake history" data-tooltip="Back in fake history" aria-label="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"></path></svg>
          </button>
          <button class="icon-button" type="button" data-action="forward" title="Forward in fake history" data-tooltip="Forward in fake history" aria-label="Forward">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"></path></svg>
          </button>
          <button class="icon-button" type="button" data-action="reload" title="Reload current fake URL" data-tooltip="Reload current fake URL" aria-label="Reload">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66"></path><path d="M20 4v6h-6"></path></svg>
          </button>
        </div>
        <div class="actions">
          <button class="icon-button" type="button" data-action="run" title="Open typed fake URL" data-tooltip="Open typed fake URL" aria-label="Run">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
          </button>
          <button class="icon-button" type="button" data-action="reset" title="Reset WebRuntime runtime" data-tooltip="Reset WebRuntime runtime" aria-label="Reset">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path></svg>
          </button>
          <span id="status" class="status">Ready</span>
        </div>
      </header>
      <main class="workspace">
        <section class="preview-wrap" aria-label="Preview">
          <iframe id="preview" class="preview" title="WebRuntime preview"></iframe>
          <div id="stream-status" class="stream-status" hidden aria-live="polite"></div>
        </section>
        <aside class="debug" aria-label="Debug panels">
          <section class="panel">
            <div class="panel-header">
              <h2>Trace</h2>
            </div>
            <pre id="trace-output"></pre>
          </section>
          <section class="panel">
            <div class="panel-header">
              <h2>Edge Cache</h2>
              <button class="icon-button" type="button" data-action="purge" title="Purge edge cache" data-tooltip="Purge edge cache" aria-label="Purge cache">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>
              </button>
            </div>
            <pre id="cache-output"></pre>
          </section>
        </aside>
      </main>
      <section class="terminal" aria-label="Fake terminal">
        <pre id="terminal-output"></pre>
        <input id="terminal-command" class="terminal-input" value="help" aria-label="Terminal command">
        <button id="terminal-run" class="icon-button" type="button" title="Run terminal command" data-tooltip="Run terminal command" aria-label="Run command">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
        </button>
      </section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
